services:
  # 1. FastAPI 백엔드 서비스 (8000포트)
  backend:
    build: ./woojeongai
    container_name: titanic_backend_container
    ports:
      - "8000:8000"
    volumes:
      - ./woojeongai/output:/app/output:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    # environment:
    #   - ANTHROPIC_API_KEY=내_실제_API_키_입력
    restart: unless-stopped

  # 2. Next.js 프론트엔드 서비스 (3000포트) — dev 모드 (핫 리로드)
  frontend:
    build:
      context: ./alexview
      dockerfile: Dockerfile.dev
    container_name: titanic_frontend_container
    ports:
      - "3000:3000"
    volumes:
      - ./alexview:/app
      - /app/node_modules
    environment:
      - API_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # 3. n8n 워크플로우 자동화 (5678포트)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_container
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_API_KEY=${N8N_API_KEY}
    restart: unless-stopped

  # 4. pgvector (PostgreSQL + vector extension) (5432포트)
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector_container
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    env_file:
      - ./woojeongai/.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped

  # 5. Redis (6379포트)
  redis:
    image: redis:7-alpine
    container_name: redis_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - ./woojeongai/.env
    restart: unless-stopped

  # 6. pgAdmin — PostgreSQL 웹 UI (5050포트)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - pgvector
    restart: unless-stopped

  # 7. Neo4j 그래프 DB (7474 Browser UI, 7687 Bolt)
  neo4j:
    image: neo4j:5
    container_name: neo4j_container
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/1234
      - NEO4J_dbms_security_auth__minimum__password__length=4
    restart: unless-stopped

volumes:
  n8n_data:
  pgvector_data:
  pgadmin_data:
  redis_data:
  neo4j_data:
