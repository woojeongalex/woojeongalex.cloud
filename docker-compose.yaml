networks:
  woojeongalex_net:
    driver: bridge

services:
  # 1. FastAPI 백엔드 서비스 (8000포트)
  backend:
    build: ./woojeongai
    container_name: titanic_backend_container
    ports:
      - "8000:8000"
    volumes:
      - ./woojeongai:/app
      - ./woojeongai/output:/app/output:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgvector:5432/${POSTGRES_DB}
    networks: [woojeongalex_net]
    depends_on:
      pgvector:
        condition: service_started
    restart: unless-stopped

  # 2. Auth Gateway (9000포트 — 외부 미노출, cloudflared 전용)
  auth:
    build: ./woojeongai
    container_name: auth_gateway_container
    command: uvicorn auth_main:app --host 0.0.0.0 --port 9000
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgvector:5432/${POSTGRES_DB}
    networks: [woojeongalex_net]
    depends_on:
      pgvector:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # 3. n8n 워크플로우 자동화 (5678포트)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_container
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_API_KEY=${N8N_API_KEY}
    networks: [woojeongalex_net]
    restart: unless-stopped

  # 4. pgvector (PostgreSQL + vector extension) (5432포트)
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector_container
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks: [woojeongalex_net]
    restart: unless-stopped

  # 5. Redis (6379포트)
  redis:
    image: redis:7-alpine
    container_name: redis_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - ./.env
    networks: [woojeongalex_net]
    restart: unless-stopped

  # 6. pgAdmin — PostgreSQL 웹 UI (5050포트)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_container
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks: [woojeongalex_net]
    depends_on:
      - pgvector
    restart: unless-stopped

  # 7. Neo4j 그래프 DB (7474 Browser UI, 7687 Bolt)
  neo4j:
    image: neo4j:5
    container_name: neo4j_container
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/1234
      - NEO4J_dbms_security_auth__minimum__password__length=4
    networks: [woojeongalex_net]
    restart: unless-stopped

volumes:
  n8n_data:
  pgvector_data:
  pgadmin_data:
  redis_data:
  neo4j_data:
